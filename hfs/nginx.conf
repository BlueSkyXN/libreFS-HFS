worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr notice;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr notice;

    ignore_invalid_headers off;

    client_max_body_size 0;
    proxy_buffering off;
    proxy_request_buffering off;

    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path /tmp/nginx/proxy;
    fastcgi_temp_path /tmp/nginx/fastcgi;
    uwsgi_temp_path /tmp/nginx/uwsgi;
    scgi_temp_path /tmp/nginx/scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    map $http_host $proxy_host_header {
        default $http_host;
        "" $host;
    }

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    map $http_x_forwarded_host $forwarded_host {
        default $http_x_forwarded_host;
        "" $proxy_host_header;
    }

    server {
        listen 7860;
        server_name _;

        location = /console {
            return 308 /console/;
        }

        location = /_ops {
            return 308 /_ops/$is_args$args;
        }

        location /_ops/ {
            proxy_http_version 1.1;

            proxy_set_header Host $proxy_host_header;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Forwarded-Method $request_method;

            proxy_pass http://127.0.0.1:8081/;
        }

        location = /_admin {
            return 308 /_admin/$is_args$args;
        }

        location /_admin/ {
            proxy_http_version 1.1;

            proxy_set_header Host $proxy_host_header;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Forwarded-Method $request_method;

            proxy_pass http://127.0.0.1:8082/;
        }

        location /console/ {
            proxy_http_version 1.1;

            proxy_set_header Host $proxy_host_header;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors 'self' https://huggingface.co https://*.huggingface.co" always;

            proxy_pass http://127.0.0.1:9001/;
        }

        location / {
            proxy_http_version 1.1;

            proxy_set_header Host $proxy_host_header;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_set_header Connection "";

            proxy_pass http://127.0.0.1:9000;
        }
    }
}
